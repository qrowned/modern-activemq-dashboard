apiVersion: apps/v1
kind: Deployment
metadata:
  name: activemq-dashboard-frontend
  namespace: activemq-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activemq-dashboard-frontend
  template:
    metadata:
      labels:
        app: activemq-dashboard-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/qrowned/modern-activemq-dashboard-frontend:latest
          ports:
            - name: http
              containerPort: 80
          env:
            - name: BACKEND_URL
              value: "http://activemq-dashboard-backend:8080"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
