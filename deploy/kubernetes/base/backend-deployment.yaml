apiVersion: apps/v1
kind: Deployment
metadata:
  name: activemq-dashboard-backend
  namespace: activemq-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: activemq-dashboard-backend
  template:
    metadata:
      labels:
        app: activemq-dashboard-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/activemq-dashboard-backend:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ACTIVEMQ_URL
              valueFrom:
                secretKeyRef:
                  name: activemq-dashboard-credentials
                  key: ACTIVEMQ_URL
            - name: ACTIVEMQ_USER
              valueFrom:
                secretKeyRef:
                  name: activemq-dashboard-credentials
                  key: ACTIVEMQ_USER
            - name: ACTIVEMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: activemq-dashboard-credentials
                  key: ACTIVEMQ_PASSWORD
            - name: BROKER_NAME
              valueFrom:
                secretKeyRef:
                  name: activemq-dashboard-credentials
                  key: BROKER_NAME
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
