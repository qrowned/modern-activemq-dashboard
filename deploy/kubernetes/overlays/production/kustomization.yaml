apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingress.yaml

images:
  - name: ghcr.io/qrowned/modern-activemq-dashboard-backend
    newTag: "1.0.0"   # pin to a specific release tag
  - name: ghcr.io/qrowned/modern-activemq-dashboard-frontend
    newTag: "1.0.0"

patches:
  - target:
      kind: Deployment
      name: activemq-dashboard-backend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: activemq-dashboard-frontend
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
