apiVersion: v1
kind: Service
metadata:
  name: {{ include "activemq-dashboard.backend.serviceName" . }}
  labels:
    {{- include "activemq-dashboard.labels" . | nindent 4 }}
    {{- include "activemq-dashboard.backend.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.backend.service.type }}
  selector:
    {{- include "activemq-dashboard.backend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
