{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "activemq-dashboard.secretName" . }}
  labels:
    {{- include "activemq-dashboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  ACTIVEMQ_URL: {{ .Values.activemq.url | quote }}
  ACTIVEMQ_USER: {{ .Values.activemq.user | quote }}
  ACTIVEMQ_PASSWORD: {{ .Values.activemq.password | quote }}
  BROKER_NAME: {{ .Values.activemq.brokerName | quote }}
{{- end }}
