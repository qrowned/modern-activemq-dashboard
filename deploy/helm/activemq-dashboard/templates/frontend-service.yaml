apiVersion: v1
kind: Service
metadata:
  name: {{ include "activemq-dashboard.frontend.serviceName" . }}
  labels:
    {{- include "activemq-dashboard.labels" . | nindent 4 }}
    {{- include "activemq-dashboard.frontend.selectorLabels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "activemq-dashboard.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
