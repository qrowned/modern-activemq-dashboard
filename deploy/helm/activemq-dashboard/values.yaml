activemq:
  url: "http://activemq:8161"
  user: "admin"
  password: "admin"
  brokerName: "localhost"

existingSecret: ""   # name of pre-created Secret; skips chart-managed Secret creation

backend:
  image:
    repository: ghcr.io/your-org/activemq-dashboard-backend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  livenessProbe:
    httpGet:
      path: /api/v1/health
      port: 8080
    initialDelaySeconds: 10
    periodSeconds: 30
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /api/v1/health
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3

frontend:
  image:
    repository: ghcr.io/qrowned/modern-activemq-dashboard-frontend
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
  livenessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 5
    periodSeconds: 30
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /
      port: 80
    initialDelaySeconds: 3
    periodSeconds: 10
    failureThreshold: 3

ingress:
  enabled: false
  className: "nginx"
  host: "activemq-dashboard.example.com"
  annotations: {}
  tls: []

imagePullSecrets: []
podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
