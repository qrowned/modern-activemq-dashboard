version: '3.8'

services:
  activemq:
    image: apache/activemq-classic:5.18.3
    ports:
      - "8161:8161"
      - "61616:61616"
      - "61613:61613"
    environment:
      ACTIVEMQ_OPTS: "-Djetty.host=0.0.0.0"
    volumes:
      - ./activemq/conf/activemq.xml:/opt/apache-activemq/conf/activemq.xml:ro
      - activemq-data:/opt/apache-activemq/data
    networks:
      - dashboard-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f -u admin:admin http://localhost:8161/api/jolokia/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      ACTIVEMQ_URL: http://activemq:8161
      ACTIVEMQ_USER: admin
      ACTIVEMQ_PASSWORD: admin
      PORT: 8080
      BROKER_NAME: localhost
    depends_on:
      activemq:
        condition: service_healthy
    networks:
      - dashboard-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dashboard-net
    restart: unless-stopped

networks:
  dashboard-net:
    driver: bridge

volumes:
  activemq-data: